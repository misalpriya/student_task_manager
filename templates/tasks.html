{% extends 'layout.html' %}

{% block content  %}

<h2>Task List</h2>

<table class="table table-bordered">

    <thead>

        <tr>
            <th>ID</th>
            <th>Task Name</th>
            <th>Description</th>
            <th>Maximum Marks</th>
        </tr>
    </thead>

    <tbody>

        {% for task in tasks %}

        <tr>

        <th>{{ task.task_id }}</th>
            <th>{{ task.task_name }}</th>
            <th>{{ task.task_description }}</th>
            <th>{{ task.maximum_marks }}</th>
        </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}
